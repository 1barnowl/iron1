### 🚀 Upgrade Path from v0.1

1. **Backup your data** (if you have important data):
   ```bash
   docker exec energy-timescaledb pg_dump -U energy_user energy_monitor > backup.sql
   ```

2. **Stop old version**:
   ```bash
   docker-compose down
   ```

3. **Pull v0.2 code** (already done if reading this)

4. **Run setup**:
   ```bash
   ./setup.sh
   ```

5. **Start v0.2**:
   ```bash
   ./start.sh
   ```

6. **Restore data** (if needed):
   ```bash
   docker exec -i energy-timescaledb psql -U energy_user energy_monitor < backup.sql
   ```

### 📝 Notes

- **Authentication**: Disabled by default for easy initial setup. Enable with `AUTH_ENABLED=true` in `.env`
- **ML Models**: Require 1000+ samples per device. Models will train automatically after 24 hours of data collection
- **Grafana**: Login with username `admin` and password from `.env` file
- **Prometheus**: Metrics available at `http://localhost:8000/metrics`

