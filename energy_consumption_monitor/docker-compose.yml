### 🔄 Breaking Changes

**MQTT Authentication Required**
- **Change**: MQTT broker now requires username/password by default
- **Migration**: Run `./setup.sh` to generate credentials, or manually create `.env` file
- **Impact**: Existing MQTT clients must authenticate

**Energy Calculation Method Changed**
- **Change**: Energy is now calculated using trapezoidal integration
- **Impact**: Historical cost estimates may differ (now correct)
- **Migration**: No action needed, applies to new calculations

### ⚙️ Configuration Changes

**New Environment Variables** (see `.env.template`):
- `DB_PASSWORD` - Database password (generated)
- `MQTT_USER` - MQTT username
- `MQTT_PASSWORD` - MQTT password (generated)
- `JWT_SECRET` - JWT signing key (generated)
- `AUTH_ENABLED` - Enable/disable API authentication
- `GRAFANA_PASSWORD` - Grafana admin password (generated)
- `ALLOWED_ORIGINS` - CORS allowed origins
- `LOG_LEVEL` - Logging verbosity

