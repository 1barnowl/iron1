# Changelog - v0.2.0 Production Hardening

## [0.2.0] - 2024-04-21 - PRODUCTION HARDENING RELEASE

### 🔥 Critical Fixes

**ENERGY CALCULATION BUG FIXED**
- ✅ **Fixed**: Replaced broken `SUM(power_watts) / 1000.0 / 4.0` calculation that assumed 15-minute intervals
- ✅ **Solution**: Implemented proper trapezoidal integration that calculates energy correctly regardless of sample interval
- **Impact**: Energy and cost estimates are now mathematically correct
- **Technical**: Uses `((P1 + P2)/2 * dt)` integration over actual time intervals

**TIMESTAMP HANDLING FIXED**
- ✅ **Fixed**: Backend now accepts both `"time"` and `"timestamp"` fields from different data sources
- ✅ **Fixed**: Proper ISO 8601 timestamp parsing with timezone support
- **Impact**: Compatible with more data sources (Zigbee2MQTT, Tasmota, custom scripts)

### 🔒 Security Enhancements

**MQTT Authentication**
- ✅ **Added**: Password-based authentication for MQTT broker
- ✅ **Added**: Automatic password generation in setup script
- **Configuration**: `mosquitto/auth/passwd` file, username/password in `.env`
- **Impact**: No more anonymous MQTT connections

**API Authentication** (Optional)
- ✅ **Added**: JWT-based authentication for API endpoints
- ✅ **Added**: `/auth/login` endpoint for token generation
- ✅ **Added**: User management with role-based scopes (read, write, admin)
- **Configuration**: Set `AUTH_ENABLED=true` in `.env` to enable
- **Default**: Disabled for ease of initial setup

**Secure Defaults**
- ✅ **Added**: Environment variable template (`.env.template`)
- ✅ **Added**: Setup script generates secure random passwords
- ✅ **Added**: Configurable CORS origins (not wide-open `*` by default)
- ✅ **Removed**: Hardcoded credentials from docker-compose.yml

### 🤖 Machine Learning Features

**Real ML-Based Anomaly Detection**
- ✅ **Added**: Isolation Forest algorithm for detecting unusual patterns
- ✅ **Added**: Per-device model training on historical data
- ✅ **Added**: Automatic retraining every 24 hours
- ✅ **Added**: Model persistence to disk (`/app/models/`)
- **Minimum Data**: Requires 1000+ samples per device for training
- **Features Used**: power_watts, voltage, current, power_factor
- **Contamination**: 5% (expects 5% of data to be anomalies)

**Configurable Threshold Detection**
- ✅ **Added**: Device-specific alert thresholds in database
- ✅ **Added**: Separate thresholds for power (high/low) and voltage (high/low)
- ✅ **Added**: Per-device enable/disable of alerting
- **Impact**: No more hardcoded 20kW threshold

