#!/usr/bin/env python3
"""
Shelly Plug Integration for Energy Monitor
Polls Shelly WiFi smart plugs and publishes to MQTT

Compatible with: Shelly Plug, Shelly Plug S, Shelly Plus Plug S
"""

import requests
import paho.mqtt.client as mqtt
import json
import time
import os
from datetime import datetime

class ShellyIntegration:
    def __init__(self, mqtt_broker="localhost", mqtt_port=1883):
        # MQTT Configuration
        self.mqtt_broker = mqtt_broker
        self.mqtt_port = mqtt_port
        self.mqtt_user = os.getenv("MQTT_USER", "energy_mqtt")
        self.mqtt_password = os.getenv("MQTT_PASSWORD")
        
        # Shelly devices to monitor (add your devices here)
        self.devices = [
            {
                "ip": "192.168.1.100",
                "device_id": "SHELLY_KITCHEN",
                "name": "Kitchen Outlets",
                "location": "Kitchen"
            },
            {
                "ip": "192.168.1.101",
                "device_id": "SHELLY_OFFICE",
                "name": "Office Equipment",
                "location": "Home Office"
            }
        ]
        
        # Initialize MQTT client
        self.mqtt_client = mqtt.Client()
        if self.mqtt_user and self.mqtt_password:
            self.mqtt_client.username_pw_set(self.mqtt_user, self.mqtt_password)
        
        self.mqtt_client.connect(self.mqtt_broker, self.mqtt_port, 60)
        self.mqtt_client.loop_start()
        
        print(f"Connected to MQTT broker at {mqtt_broker}:{mqtt_port}")
    
    def get_shelly_gen1_data(self, ip):
        """Get data from Gen1 Shelly devices (original Shelly Plug, Plug S)"""
        try:
            response = requests.get(f"http://{ip}/status", timeout=5)
            if response.status_code == 200:
                data = response.json()
                meter = data.get('meters', [{}])[0]
                
                return {
                    "power_watts": meter.get('power', 0),
                    "voltage": data.get('voltage', 120.0),  # May not be available
                    "current": meter.get('current', 0) if 'current' in meter else meter.get('power', 0) / 120.0,
                    "is_on": data.get('relays', [{}])[0].get('ison', False),
                    "total_kwh": meter.get('total', 0) / 60000.0  # Convert Wmin to kWh
                }
        except Exception as e:
            print(f"Error reading from {ip}: {e}")
            return None
    
    def get_shelly_gen2_data(self, ip):
        """Get data from Gen2 Shelly devices (Plus Plug S)"""
        try:
            response = requests.post(
                f"http://{ip}/rpc/Switch.GetStatus",
                json={"id": 0},
                timeout=5
            )
            
            if response.status_code == 200:
                data = response.json()
                
                return {
                    "power_watts": data.get('apower', 0),
                    "voltage": data.get('voltage', 120.0),
                    "current": data.get('current', 0),
                    "is_on": data.get('output', False),
                    "total_kwh": data.get('aenergy', {}).get('total', 0) / 1000.0,
                    "power_factor": data.get('pf', 1.0)
                }
        except Exception as e:
            # Try Gen1 format
            return self.get_shelly_gen1_data(ip)
    
    def publish_device_data(self, device):
        """Read and publish data for a device"""
        ip = device['ip']
        device_id = device['device_id']
        
        # Try Gen2 first, fallback to Gen1
        data = self.get_shelly_gen2_data(ip)
        
        if data is None:
            print(f"⚠️  Could not read from {device_id} ({ip})")
            return
        
        # Build MQTT payload
        payload = {
            "device_id": device_id,
            "location": device.get("location", "Unknown"),
            "power_watts": data['power_watts'],
            "voltage": data.get('voltage', 120.0),
            "current": data.get('current', 0),
            "power_factor": data.get('power_factor', 0.95),
            "timestamp": datetime.utcnow().isoformat() + "Z",
            "metadata": {
                "is_on": data['is_on'],
                "total_kwh": data.get('total_kwh', 0),
                "ip_address": ip
            }
        }
        
        # Publish to MQTT
        topic = f"energy/sensors/{device_id}"
        self.mqtt_client.publish(topic, json.dumps(payload))
        
        status = "ON" if data['is_on'] else "OFF"
        print(f"✓ {device_id}: {data['power_watts']:.2f}W [{status}]")
    
    def run(self, interval=10):
        """Main polling loop"""
        print(f"\nMonitoring {len(self.devices)} Shelly devices")
        print(f"Publishing every {interval} seconds")
        print("Press Ctrl+C to stop\n")
        
        try:
            while True:
                for device in self.devices:
                    self.publish_device_data(device)
                
                time.sleep(interval)
        
        except KeyboardInterrupt:
            print("\nStopping...")
            self.mqtt_client.loop_stop()
            self.mqtt_client.disconnect()


def discover_shelly_devices(network="192.168.1"):
    """
    Discover Shelly devices on local network
    Scans network range and identifies Shelly devices
    """
    import socket
    
    print(f"Scanning {network}.0/24 for Shelly devices...")
    found = []
    
    for i in range(1, 255):
        ip = f"{network}.{i}"
        try:
            # Quick connection test
            sock = socket.socket(socket.AF_INET, socket.SOCK_STREAM)
            sock.settimeout(0.1)
            result = sock.connect_ex((ip, 80))
            sock.close()
            
            if result == 0:
                # Try to get device info
                try:
                    response = requests.get(f"http://{ip}/shelly", timeout=1)
                    if response.status_code == 200:
                        info = response.json()
                        device_type = info.get('type', 'Unknown')
                        device_name = info.get('name', 'Unnamed')
                        print(f"Found: {ip} - {device_type} ({device_name})")
                        found.append({
                            "ip": ip,
                            "type": device_type,
                            "name": device_name
                        })
                except:
                    pass
        except:
            pass
    
    print(f"\nFound {len(found)} Shelly device(s)")
    return found


if __name__ == "__main__":
    import argparse
    
    parser = argparse.ArgumentParser(description="Shelly Plug Integration")
    parser.add_argument("--discover", action="store_true", help="Discover Shelly devices on network")
    parser.add_argument("--network", default="192.168.1", help="Network to scan (default: 192.168.1)")
    parser.add_argument("--interval", type=int, default=10, help="Polling interval in seconds")
    
    args = parser.parse_args()
    
    if args.discover:
        discover_shelly_devices(args.network)
    else:
        integration = ShellyIntegration()
        integration.run(interval=args.interval)
