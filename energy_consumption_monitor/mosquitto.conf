# Troubleshooting Guide

## Common Issues and Solutions

### Services Won't Start

**Problem**: `docker-compose up -d` fails or services exit immediately

**Solutions**:
1. Check if ports are already in use:
   ```bash
   sudo netstat -tulpn | grep -E ':(1883|5432|8000|8501)'
   ```
2. Stop conflicting services:
   ```bash
   sudo systemctl stop postgresql  # If system PostgreSQL is running
   ```
3. Check Docker daemon:
   ```bash
   sudo systemctl status docker
   sudo systemctl start docker
   ```
4. View container logs:
   ```bash
   docker-compose logs backend
   docker-compose logs timescaledb
   ```

### Database Connection Errors

**Problem**: Backend can't connect to TimescaleDB

**Solutions**:
1. Verify TimescaleDB is running:
   ```bash
   docker-compose ps timescaledb
   ```
2. Check database logs:
   ```bash
   docker-compose logs timescaledb
   ```
3. Test connection manually:
   ```bash
   docker exec -it energy-timescaledb psql -U energy_user -d energy_monitor
   ```
4. Recreate database with clean state:
   ```bash
   docker-compose down -v
   docker-compose up -d
   ```

### MQTT Connection Failed

**Problem**: Backend or simulator can't connect to MQTT broker

**Solutions**:
1. Check Mosquitto status:
   ```bash
   docker-compose ps mosquitto
   docker-compose logs mosquitto
   ```
2. Test MQTT connection:
   ```bash
   # Install mosquitto-clients if needed
   sudo apt install mosquitto-clients
   
   # Test publish
   mosquitto_pub -h localhost -p 1883 -t test -m "hello"
   
   # Test subscribe
   mosquitto_sub -h localhost -p 1883 -t test
   ```
3. Restart Mosquitto:
   ```bash
   docker-compose restart mosquitto
   ```

### Dashboard Not Loading

**Problem**: http://localhost:8501 doesn't respond

**Solutions**:
1. Check if Streamlit is running:
   ```bash
   docker-compose ps dashboard
   docker-compose logs dashboard
   ```
2. Verify backend API is accessible:
   ```bash
   curl http://localhost:8000/health
   ```
3. Check browser console for errors (F12)
4. Try accessing from different browser
5. Restart dashboard:
   ```bash
   docker-compose restart dashboard
   ```

### No Data Appearing

**Problem**: Dashboard shows "No data available"

**Solutions**:
1. Check if simulator is running:
   ```bash
   docker-compose ps simulator
   docker-compose logs simulator
   ```
2. Verify MQTT messages are being published:
   ```bash
   mosquitto_sub -h localhost -p 1883 -t 'energy/#' -v
   ```
3. Check if data is in database:
   ```bash
   docker exec -it energy-timescaledb psql -U energy_user -d energy_monitor -c "SELECT COUNT(*) FROM sensor_data;"
   ```
4. Restart all services:
   ```bash
   docker-compose restart
   ```

### High CPU/Memory Usage

**Problem**: System running slow, high resource usage

**Solutions**:
1. Check resource usage:
   ```bash
   docker stats
   ```
2. Reduce simulator frequency (edit simulator/simulator.py, increase interval)
3. Implement data retention policy:
   ```sql
   -- Delete old data (keep last 30 days)
   DELETE FROM sensor_data WHERE time < NOW() - INTERVAL '30 days';
   ```
4. Add compression to TimescaleDB:
   ```sql
   ALTER TABLE sensor_data SET (
     timescaledb.compress,
     timescaledb.compress_segmentby = 'device_id'
   );
   
   SELECT add_compression_policy('sensor_data', INTERVAL '7 days');
   ```

### Permission Denied Errors

**Problem**: Cannot access Docker socket or files

**Solutions**:
1. Add user to docker group:
   ```bash
   sudo usermod -aG docker $USER
   newgrp docker
   ```
2. Fix file permissions:
   ```bash
   sudo chown -R $USER:$USER .
   ```
3. Run with sudo (not recommended for production):
   ```bash
   sudo docker-compose up -d
   ```

### Port Already in Use

**Problem**: "bind: address already in use"

**Solutions**:
1. Find process using the port:
   ```bash
   sudo lsof -i :8501  # For dashboard
   sudo lsof -i :8000  # For backend
   sudo lsof -i :5432  # For database
   sudo lsof -i :1883  # For MQTT
   ```
2. Kill the process or change port in docker-compose.yml:
   ```yaml
   ports:
     - "8502:8501"  # Change left side to available port
   ```

### Container Keeps Restarting

**Problem**: Container in restart loop

**Solutions**:
1. Check logs for crash reason:
   ```bash
   docker-compose logs --tail=100 <service_name>
   ```
2. Check if dependencies are ready:
   ```bash
   # Ensure database is fully started before backend
   docker-compose up -d timescaledb
   sleep 10
   docker-compose up -d backend
   ```
3. Increase startup timeout in docker-compose.yml

## Performance Optimization

### Database Tuning

Add to `database/init.sql`:
```sql
-- Optimize for time-series queries
CREATE INDEX idx_sensor_time_device ON sensor_data (time DESC, device_id);

-- Enable parallel query execution
ALTER TABLE sensor_data SET (parallel_workers = 4);
```

### Memory Limits

Add to services in `docker-compose.yml`:
```yaml
services:
  timescaledb:
    mem_limit: 2g
    memswap_limit: 2g
```

### Network Optimization

For production, use host networking:
```yaml
services:
  mosquitto:
    network_mode: "host"
```

## Getting Help

If issues persist:
1. Check full logs: `docker-compose logs > logs.txt`
2. Review system resources: `free -h && df -h`
3. Verify Docker version: `docker --version`
4. Check TimescaleDB documentation: https://docs.timescale.com/
5. Review FastAPI docs: https://fastapi.tiangolo.com/

## Clean Slate Reset

To completely reset and start fresh:
```bash
# Stop and remove everything
docker-compose down -v

# Remove all images (optional)
docker-compose down --rmi all

# Clean Docker system
docker system prune -a

# Restart
docker-compose up -d
```
